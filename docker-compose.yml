version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: digilaw-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: digilaw

  backend:
    build: ./backend
    container_name: digilaw-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
    environment:
      - DEBUG=True
      - MONGODB_URI=mongodb://mongodb:27017/digilaw
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-digilaw-secret-key-change-in-production}
    depends_on:
      - mongodb
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build: ./frontend
    container_name: digilaw-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  chroma_data: